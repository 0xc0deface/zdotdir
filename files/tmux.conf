#$XDG_CONFIG_HOME/tmux/tmux.conf

# Set TPM plugin directory
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'sainnhe/tmux-fzf'

# tmux-better-mouse-mode settings
set -g @scroll-down-exit-copy-mode on
set -g @scroll-without-changing-pane on
set -g @scroll-in-moused-over-pane on
set -g @scroll-speed-num-lines-per-scroll 3
set -g @emulate-scroll-for-no-mouse-alternate-buffer on

set -g @plugin 'dracula/tmux'
set -g @dracula-show-fahrenheit false
set -g @dracula-show-powerline true
set -g @dracula-plugins "cwd git ssh-session time"
set -g @dracula-show-left-icon "session: #S"

#install entr so this works
set-option -g @plugin 'b0o/tmux-autoreload'

set-option -g mouse on
setw -g aggressive-resize on

# don't rename windows automatically
set-option -g allow-rename off

unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# switch panes using Alt-arrow without prefix
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

# switch windows with page up/down
bind-key -n C-PageDown next-window
bind-key -n C-PageUp previous-window

# Set clipboard command based on display server (Wayland/X11)
# For Wayland, use wl-copy; for X11 SSH sessions, use xsel (more reliable than xclip)
# Note: On remote machines via SSH with X11 forwarding, xsel forwards to local clipboard
if-shell '[ -n "$WAYLAND_DISPLAY" ]' \
    'set -s copy-command "wl-copy"' \
    'set -s copy-command "xsel -b"'

# Enable mouse drag to copy (uses copy-command set above)
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
